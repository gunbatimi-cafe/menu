<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adisyon</title>


<style>

body{
background:#15110d;
color:white;
margin:0;
font-family:Arial,sans-serif;
}


.header{
background:#211a14;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:#d9b26f;
border-bottom:2px solid #d9b26f;
}


.container{

display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:20px;

}


.products{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:15px;

}


.product{

background:#211a14;
border:1px solid #3a2d21;
border-radius:15px;
padding:15px;
cursor:pointer;
transition:.2s;

}


.product:hover{

transform:scale(1.03);

}


.product h3{

color:#d9b26f;
margin-bottom:10px;

}


.product p{

font-size:18px;

}


.cart{

background:#211a14;
padding:20px;
border-radius:15px;
height:fit-content;

}


.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
padding:10px;
background:#2a221b;
border:1px solid #3a2d21;
border-radius:10px;
gap:10px;
}

.cart-item span{
flex:1;
font-size:16px;
word-break:break-word;
}

.cart-buttons{
display:flex;
align-items:center;
gap:6px;
}

.mini-btn{
width:40px;
height:40px;
margin:0;
padding:0;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:#d9b26f;
color:#15110d;
cursor:pointer;
transition:.2s;
}

.mini-btn:hover{
transform:scale(1.05);
}

.danger{
background:#b22222;
color:#fff;
}

@media(max-width:600px){

.cart-item{
padding:8px;
}

.cart-item span{
font-size:14px;
}

.cart-buttons{
gap:4px;
}

.mini-btn{
width:34px;
height:34px;
font-size:16px;
}

}


.total{

margin-top:20px;
font-size:24px;
font-weight:bold;
color:#d9b26f;

}


button{

width:100%;
margin-top:20px;
padding:15px;
font-size:18px;
border:none;
border-radius:12px;
background:#d9b26f;
font-weight:bold;
cursor:pointer;

}



@media(max-width:900px){

.container{

grid-template-columns:1fr;

}

}



@media(max-width:600px){


body{
overflow-x:hidden;
}


.header{
font-size:22px;
padding:15px;
}


.container{

padding:10px;
gap:10px;

}


.products{

grid-template-columns:repeat(2,1fr);
gap:10px;

}


.product{

padding:10px;
border-radius:10px;

}


.product h3{

font-size:16px;

}


.product p{

font-size:15px;

}


.cart{

padding:15px;

}


button{

font-size:16px;
padding:12px;

}


}

</style>

</head>


<body>


<div class="header">

🧾 Adisyon

</div>



<div style="padding:20px;">


<h2>Masalar</h2>


<div id="tables" class="products"></div>


<p id="selectedTable" style="
font-size:20px;
color:#d9b26f;
margin-top:15px;
">

Seçilen Masa: Yok

</p>


</div>




<div class="container">


<div>


<h2>Ürünler</h2>


<div id="products" class="products"></div>


</div>





<div class="cart">


<h2>Adisyon</h2>


<div id="cart"></div>



<div class="total">

Toplam :
<span id="total">0 TL</span>


</div>



<button id="saveOrder">

Siparişi Kaydet

</button>




<button id="closeTable">

Masa Kapat / Ödeme Al

</button>



</div>



</div>



<!-- Ödeme Penceresi -->

<div id="paymentModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
align-items:center;
justify-content:center;
z-index:999;
">


<div style="
background:#211a14;
padding:25px;
border-radius:15px;
width:300px;
text-align:center;
">


<h2 style="color:#d9b26f;">
Ödeme
</h2>


<p id="paymentTableName">
</p>


<label>
<input type="radio" name="payment" value="Nakit" checked>
Nakit
</label>


<br>


<label>
<input type="radio" name="payment" value="Kart">
Kart
</label>


<br>


<label>
<input type="radio" name="payment" value="Diğer">
Diğer
</label>



<button id="confirmPayment">

Ödeme Al

</button>



<button id="deleteOrder" style="
background:#a33;
color:white;
">

Masayı Sil

</button>



<button id="cancelPayment">

İptal

</button>


</div>


</div>
  
<script type="module" src="js/order.js"></script>


</body>

</html>
