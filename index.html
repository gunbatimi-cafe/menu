<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Günbatımı Kafe Menü</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #111;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 25px;
      background: #1c1c1c;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      color: #f5c542;
    }

    .container {
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    .category {
      margin-top: 25px;
      font-size: 20px;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
      color: #f5c542;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #222;
    }

    .name {
      font-size: 16px;
    }

    .price {
      color: #aaa;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>Günbatımı Kafe</h1>
</header>

<div class="container">

  <div class="category">☕ Kahveler</div>

  <div class="item">
    <div class="name">Americano</div>
    <div class="price">80 TL</div>
  </div>

  <div class="item">
    <div class="name">Latte</div>
    <div class="price">90 TL</div>
  </div>

  <div class="item">
    <div class="name">Cappuccino</div>
    <div class="price">90 TL</div>
  </div>

  <div class="category">🍰 Tatlılar</div>

  <div class="item">
    <div class="name">Waffle</div>
    <div class="price">250 TL</div>
  </div>

  <div class="item">
    <div class="name">Dondurma (1 Top)</div>
    <div class="price">60 TL</div>
  </div>

</div>

<footer>
  Günbatımı Kafe • QR Menü
</footer>

</body>
</html>
